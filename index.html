<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開発ヒアリングシート</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    :root {
      --bg: #fafcfd;
      --surface: #ffffff;
      --text: #1a2b3c;
      --text-muted: #5a6f82;
      --accent: #3eb8e8;
      --accent-hover: #2aa3d4;
      --accent-soft: rgba(62, 184, 232, 0.12);
      --border: #e2ecf2;
      --shadow: 0 4px 24px rgba(26, 43, 60, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 520px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 {
      font-size: clamp(1.15rem, 4.5vw, 1.45rem);
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
    }
    header p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.35rem 1.15rem 1.5rem;
    }
    .progress-wrap { margin-bottom: 1.25rem; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.45rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .progress-meta strong { color: var(--accent); font-weight: 600; }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #6bcff5);
      border-radius: 999px;
      transition: width 0.35s ease;
    }
    .step-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .question {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 1.1rem;
      line-height: 1.45;
    }
    .choices { display: flex; flex-direction: column; gap: 0.65rem; }
    .choice-btn {
      display: block;
      width: 100%;
      padding: 1rem 1.1rem;
      font-size: 1rem;
      text-align: left;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 52px;
      font-family: inherit;
      line-height: 1.4;
    }
    .choice-btn:hover,
    .choice-btn:focus-visible {
      border-color: var(--accent);
      background: var(--accent-soft);
      outline: none;
    }
    .choice-btn.is-selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent);
    }
    .choice-btn.is-selected:hover,
    .choice-btn.is-selected:focus-visible {
      border-color: var(--accent-hover);
      background: var(--accent-soft);
    }
    .choice-btn:active { transform: scale(0.99); }
    textarea.field {
      width: 100%;
      min-height: 120px;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea.field:focus { outline: none; border-color: var(--accent); }
    .hint { font-size: 0.8rem; color: var(--text-muted); margin: 0.5rem 0 0; }
    .nav-row { display: flex; gap: 0.65rem; margin-top: 1.25rem; }
    .btn-secondary {
      flex: 0 0 auto;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
    .screen { display: none; }
    .screen.active { display: block; }
    .summary-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 1rem;
      text-align: center;
    }
    .summary-box {
      background: var(--accent-soft);
      border: 1px solid rgba(62, 184, 232, 0.35);
      border-radius: var(--radius-sm);
      padding: 1rem 1.05rem;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: min(50vh, 360px);
      overflow-y: auto;
    }
    .actions { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1.15rem; }
    .btn-primary {
      width: 100%;
      padding: 1rem 1.1rem;
      font-size: 1.02rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      min-height: 52px;
      box-shadow: 0 4px 14px rgba(62, 184, 232, 0.35);
      transition: background 0.2s, transform 0.15s;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.99); }
    button.btn-primary { display: block; }
    .btn-outline {
      background: #fff;
      color: var(--accent);
      border: 2px solid var(--accent);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--accent-soft);
      color: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .optional-block { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.88rem;
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .restart { margin-top: 0.75rem; text-align: center; }
    .restart button {
      background: none;
      border: none;
      color: var(--text-muted);
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: inherit;
    }
    .restart button:hover { color: var(--accent); }
    .form-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0.85rem 0 0.35rem;
    }
    .form-label:first-of-type { margin-top: 0; }
    .field-input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .field-input:focus { outline: none; border-color: var(--accent); }
    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary:disabled:hover { background: var(--accent); }
    .voice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }
    .btn-voice {
      padding: 0.55rem 0.9rem;
      font-size: 0.88rem;
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      background: var(--accent-soft);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }
    .btn-voice:hover { background: rgba(62, 184, 232, 0.22); }
    .btn-voice:disabled { opacity: 0.5; cursor: not-allowed; }
    .voice-hint { font-size: 0.78rem; color: var(--text-muted); margin: 0; flex: 1 1 100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>開発ヒアリングシート</h1>
      <p>目的を選び、所要に応じた内容をご記入ください</p>
    </header>
    <div class="card" id="app-card">

          </div>

            <div class="progress-fill" id="progress-fill" style="width: 7.1428571429%"></div>
          </div>
        </div>
        <div class="step-label" id="step-label">STEP 1</div>
        <h2 class="question" id="question-text"></h2>
        <div id="choices-area"></div>
        <div class="nav-row" id="nav-back-wrap" style="display: none;">
          <button type="button" class="btn-secondary" id="btn-back">戻る</button>
        </div>
      </div>
      <div id="screen-consult-end" class="screen">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span>進捗</span>
            <span><strong>4</strong> / 4</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuenow="4" aria-valuemax="4" aria-valuemin="1">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
        </div>
        <div class="step-label">お問い合わせ</div>
        <h2 class="question">お名前とメールアドレス</h2>
        <p class="hint" style="margin-bottom: 1rem">送信内容を確認のうえ、ご連絡先をご記入ください。</p>
        <label class="form-label" for="consult-cust-name">お名前 <span class="hint" style="font-weight:400">（必須）</span></label>
        <input type="text" class="field-input" id="consult-cust-name" name="consult-cust-name" autocomplete="name" required>
        <label class="form-label" for="consult-cust-email">メールアドレス <span class="hint" style="font-weight:400">（必須）</span></label>
        <input type="email" class="field-input" id="consult-cust-email" name="consult-cust-email" autocomplete="email" required>
        <div class="nav-row" style="margin-top: 1.25rem">
          <button type="button" class="btn-secondary" id="btn-consult-end-back">戻る</button>
          <button type="button" class="btn-primary" id="btn-consult-send" style="flex: 1">相談内容を送信する</button>
        </div>
      </div>
      <div id="screen-customer" class="screen">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span>進捗</span>
            <span><strong>15</strong> / 15</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuenow="15" aria-valuemax="15" aria-valuemin="1">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
        </div>
        <div class="step-label">お客様情報</div>
        <h2 class="question">お客様情報のご入力</h2>
        <p class="hint" style="margin-bottom: 1rem">すべて任意です。ご記入いただけるとスムーズにご連絡できます。</p>
        <label class="form-label" for="cust-company">企業名（任意）</label>
        <input type="text" class="field-input" id="cust-company" name="cust-company" autocomplete="organization">
        <label class="form-label" for="cust-name">担当者のお名前（任意）</label>
        <input type="text" class="field-input" id="cust-name" name="cust-name" autocomplete="name">
        <label class="form-label" for="cust-phone">電話番号（任意）</label>
        <input type="tel" class="field-input" id="cust-phone" name="cust-phone" autocomplete="tel">
        <label class="form-label" for="cust-email">メールアドレス（任意）</label>
        <input type="email" class="field-input" id="cust-email" name="cust-email" autocomplete="email">
        <label class="form-label">今後のやりとりの希望</label>
        <div class="choices" id="cust-contact-wrap"></div>
        <div class="nav-row" style="margin-top: 1.25rem">
          <button type="button" class="btn-secondary" id="btn-customer-back">戻る</button>
          <button type="button" class="btn-primary" id="btn-customer-next" style="flex: 1">次へ</button>
        </div>
      </div>
      <div id="screen-summary" class="screen">
        <h2 class="summary-title">あなたの要望まとめ</h2>
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
        </div>
        <div class="summary-box" id="summary-text"></div>
        <div class="actions">
          <button type="button" class="btn-primary" id="btn-submit">要望をまとめて送信する</button>
          <button type="button" class="btn-primary btn-outline" id="btn-copy">まとめをコピー</button>
        </div>
        <div class="restart">
          <button type="button" id="btn-restart">最初からやり直す</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" role="status">コピーしました</div>
  <script>
    (function () {

      ];
      var LABELS = [

        "STEP2：今、同じものはありますか？",
        "STEP3：誰が主に使いますか？",

      ];

           var OTHER_CHOICE = "その他・カスタマイズ希望（自由記載）";

      var EMAIL_SERVICE_ID = "service_c5okgq5";
      var EMAIL_TEMPLATE_ID = "template_q72ezhw";
      var SUBMIT_BTN_LABEL = "要望をまとめて送信する";

      var EMAIL_STEP_LABELS = [
        "STEP1：何を作りたいですか？",
        "STEP2：今、同じものはありますか？",
        "STEP3：誰が主に使いますか？",
        "STEP4：どんな場面で使いますか？",

      var CONTACT_OPTIONS = ["電話", "メール", "Zoom等ビデオ会議", "どれでもOK"];

      function disp(v) {
        var s = v != null ? String(v).trim() : "";
        return s ? s : "（未入力）";
      }

      function formatConsultMethodBlock() {
        var m = consultData.method || "";
        var lines = [];
        if (m === "メールにて") {
          lines.push("メールにて");
        } else if (m === "オンラインにて") {
          lines.push("オンラインにて");
          lines.push("詳細：" + disp(consultData.methodOnlineDetail));
        } else if (m === "その他") {
          lines.push("その他");
          lines.push("詳細：" + disp(consultData.methodOtherDetail));
        } else {
          lines.push(disp(m));
        }
        lines.push("都合の良い時間帯：" + disp(consultData.timePreference));
        return lines.join("\n");

      function copyTextToClipboard(text, onDone) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(onDone).catch(function () {
            legacyCopy(text);
            onDone();
          });
        } else {
          legacyCopy(text);
          onDone();
        }
      }

      function legacyCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
      }

      function appendVoiceControls(container, textarea) {
        var row = document.createElement("div");
        row.className = "voice-row";
        var btnV = document.createElement("button");
        btnV.type = "button";
        btnV.className = "btn-voice";
        btnV.textContent = "音声入力";
        var hint = document.createElement("p");
        hint.className = "voice-hint";
        hint.textContent = "（対応ブラウザではマイクから入力できます。スマホはキーボードの🎤からも可）";
        btnV.addEventListener("click", function () {
          var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SR) {
            showToastMessage("このブラウザではWeb音声入力に未対応です。端末の音声入力をご利用ください。", 4000);
            return;
          }
          var rec = new SR();
          rec.lang = "ja-JP";
          rec.continuous = false;
          rec.interimResults = false;
          btnV.disabled = true;
          rec.onend = function () {
            btnV.disabled = false;
          };
          rec.onresult = function (e) {
            var t = "";
            for (var i = 0; i < e.results.length; i++) {
              t += e.results[i][0].transcript;
            }
            var cur = textarea.value;
            textarea.value = cur + (cur && /[^\n]$/.test(cur) ? " " : "") + t;
          };
          rec.onerror = function () {
            showToastMessage("音声を認識できませんでした。もう一度お試しください。", 3000);
            btnV.disabled = false;
          };
          rec.start();
          showToastMessage("マイクに向かってお話しください", 2000);
        });
        row.appendChild(btnV);
        row.appendChild(hint);
        container.appendChild(row);
      }

      function renderStep() {
        if (!flowType) {
          renderIntentStep();
          return;
        }
        if (flowType === "consult") {
          if (consultSubStep === 0) {
            renderConsultContentStep();
            return;
          }
          if (consultSubStep === 1) {
            renderConsultMethodStep();
            return;
          }
        }

        var step = STEPS[currentIndex];
        elQuestion.textContent = step.question;
        setProgressDevelopQuiz();
        elNavBack.style.display = "flex";

        elChoices.innerHTML = "";

        if (step.type === "choice") {
          var rawC = answers[currentIndex] != null ? String(answers[currentIndex]) : "";
          var choicePart = "";
          var extraChoiceVal = "";
          var markC = rawC.indexOf(TEXT_EXTRA_MARK);
          if (markC >= 0) {
            choicePart = rawC.slice(0, markC).trim();
            extraChoiceVal = rawC.slice(markC + TEXT_EXTRA_MARK.length);
          } else if (rawC === OTHER_CHOICE) {
            extraChoiceVal = "";
          } else if (rawC.indexOf(OTHER_CHOICE + "\n") === 0) {
            extraChoiceVal = rawC.slice(OTHER_CHOICE.length + 1);
          } else {
            choicePart = rawC.trim();
          }
          if (choicePart && step.choices.indexOf(choicePart) < 0) {
            choicePart = "";
          }
          var selectedChoice = choicePart;

          var container = document.createElement("div");

          var wrap = document.createElement("div");
          wrap.className = "choices";
          var choiceButtons = [];
          for (var jc = 0; jc < step.choices.length; jc++) {
            (function (label) {
              var btn = document.createElement("button");
              btn.type = "button";
              btn.className = "choice-btn";
              btn.textContent = label;
              if (label === selectedChoice) {
                btn.classList.add("is-selected");
              }
              btn.addEventListener("click", function () {
                selectedChoice = label;
                for (var kb = 0; kb < choiceButtons.length; kb++) {
                  choiceButtons[kb].classList.remove("is-selected");
                }
                btn.classList.add("is-selected");
              });
              choiceButtons.push(btn);
              wrap.appendChild(btn);
            })(step.choices[jc]);
          }
          container.appendChild(wrap);

          var optWrapC = document.createElement("div");
          optWrapC.className = "optional-block";
          var optHintC = document.createElement("p");
          optHintC.className = "hint";
          optHintC.style.marginTop = "0";
          optHintC.textContent = "その他・カスタマイズ希望（自由記載・任意）";
          var taChoiceExtra = document.createElement("textarea");
          taChoiceExtra.className = "field";
          taChoiceExtra.setAttribute("aria-label", "その他・カスタマイズ希望");
          taChoiceExtra.rows = 4;
          taChoiceExtra.value = extraChoiceVal;
          optWrapC.appendChild(optHintC);
          optWrapC.appendChild(taChoiceExtra);
          container.appendChild(optWrapC);

          var rowChoice = document.createElement("div");
          rowChoice.className = "nav-row";
          rowChoice.style.marginTop = "1rem";
          var btnNextChoice = document.createElement("button");
          btnNextChoice.type = "button";
          btnNextChoice.className = "btn-primary";
          btnNextChoice.textContent = "次へ";
          btnNextChoice.addEventListener("click", function () {
            if (!selectedChoice) {
              showToastMessage("選択肢を1つ選んでください", 2400);
              return;
            }
            var ex = taChoiceExtra.value.trim();
            answers[currentIndex] = selectedChoice + (ex ? TEXT_EXTRA_MARK + ex : "");
            goNext();
          });
          rowChoice.appendChild(btnNextChoice);
          container.appendChild(rowChoice);

          elChoices.appendChild(container);
        } else {
          var raw = answers[currentIndex] != null ? String(answers[currentIndex]) : "";
          var mainVal = raw;
          var extraVal = "";
          var markPos = raw.indexOf(TEXT_EXTRA_MARK);
          if (markPos >= 0) {
            mainVal = raw.slice(0, markPos);
            extraVal = raw.slice(markPos + TEXT_EXTRA_MARK.length);
          }
          var ta = document.createElement("textarea");
          ta.className = "field";
          ta.id = "free-text";
          ta.setAttribute("aria-label", step.question);
          ta.value = mainVal;
          elChoices.appendChild(ta);
          if (step.hint) {
            var ph = document.createElement("p");
            ph.className = "hint";
            ph.textContent = step.hint;
            elChoices.appendChild(ph);
          }
          var optWrap = document.createElement("div");
          optWrap.className = "optional-block";
          var optHint = document.createElement("p");
          optHint.className = "hint";
          optHint.style.marginTop = "0";
          optHint.textContent = "その他・カスタマイズ希望（自由記載・任意）";
          var taExtra = document.createElement("textarea");
          taExtra.className = "field";
          taExtra.setAttribute("aria-label", "その他・カスタマイズ希望");
          taExtra.rows = 3;
          taExtra.value = extraVal;
          optWrap.appendChild(optHint);
          optWrap.appendChild(taExtra);
          elChoices.appendChild(optWrap);
          var submitRow = document.createElement("div");
          submitRow.className = "nav-row";
          submitRow.style.marginTop = "1rem";
          var btnNext = document.createElement("button");
          btnNext.type = "button";
          btnNext.className = "btn-primary";
          btnNext.textContent = "次へ";
          btnNext.addEventListener("click", function () {
            var m = ta.value.trim();
            var e = taExtra.value.trim();
            var combined = m;
            if (e) combined += TEXT_EXTRA_MARK + e;
            answers[currentIndex] = combined;
            goNext();
          });
          submitRow.appendChild(btnNext);
          elChoices.appendChild(submitRow);
        }
      }

      function goNext() {
        if (flowType !== "develop") {
          return;
        }
        if (currentIndex < STEPS.length - 1) {
          currentIndex++;
          renderStep();
          window.scrollTo(0, 0);
        } else {
          showCustomerScreen();
        }
      }

      function goBack() {
        if (!flowType) {
          return;
        }
        if (flowType === "consult") {
          if (consultSubStep === 0) {
            flowType = null;
            consultSubStep = 0;
            renderStep();
            window.scrollTo(0, 0);
            return;
          }
          if (consultSubStep === 1) {
            consultSubStep = 0;
            renderStep();
            window.scrollTo(0, 0);
            return;
          }
        }
        if (flowType === "develop") {
          if (currentIndex > 0) {
            currentIndex--;
            renderStep();
            window.scrollTo(0, 0);
            return;
          }
          flowType = null;
          currentIndex = 0;
          answers = [];
          renderStep();
          window.scrollTo(0, 0);
        }
      }

        elQuiz.classList.add("active");

      });

      elBtnCustomerNext.addEventListener("click", function () {
        readFormToCustomerInfo();
        showSummary();
      });

      elBtnCopy.addEventListener("click", function () {
        var text = buildSummaryText();
        copyTextToClipboard(text, function () {
          showToastMessage("コピーしました", 2200);
        });
      });

      elBtnSubmit.addEventListener("click", function () {
        if (!elSummary.classList.contains("active")) {
          showSummary();
        }
        if (typeof emailjs === "undefined") {
          alert("送信に失敗しました。もう一度お試しください。");
          return;
        }
        var text = buildSummaryText();
        elSummaryText.textContent = text;
        elBtnSubmit.disabled = true;
        elBtnSubmit.textContent = "送信中...";
        function resetSubmitBtn() {
          elBtnSubmit.disabled = false;
          elBtnSubmit.textContent = SUBMIT_BTN_LABEL;
        }
        emailjs
          .send(EMAIL_SERVICE_ID, EMAIL_TEMPLATE_ID, { message: buildEmailMessage() })
          .then(function () {
            alert("送信しました！");
            resetSubmitBtn();
          })
          .catch(function () {
            alert("送信に失敗しました。もう一度お試しください。");
            resetSubmitBtn();
          });
      });

      elBtnRestart.addEventListener("click", resetAll);

      elBtnConsultEndBack.addEventListener("click", function () {
        readConsultEndFormToData();
        consultSubStep = 1;
        elConsultEnd.classList.remove("active");
        elQuiz.classList.add("active");
        renderStep();
        window.scrollTo(0, 0);
      });

      elBtnConsultSend.addEventListener("click", function () {
        readConsultEndFormToData();
        var n = document.getElementById("consult-cust-name").value.trim();
        var em = document.getElementById("consult-cust-email").value.trim();
        if (!n || !em) {
          showToastMessage("お名前とメールアドレスをご入力ください", 2800);
          return;
        }
        consultData.name = n;
        consultData.email = em;
        if (typeof emailjs === "undefined") {
          alert("送信に失敗しました。もう一度お試しください。");
          return;
        }
        elBtnConsultSend.disabled = true;
        elBtnConsultSend.textContent = "送信中...";
        function resetConsultBtn() {
          elBtnConsultSend.disabled = false;
          elBtnConsultSend.textContent = "相談内容を送信する";
        }
        emailjs
          .send(EMAIL_SERVICE_ID, EMAIL_TEMPLATE_ID, { message: buildConsultEmailMessage() })
          .then(function () {
            alert("送信しました！");
            resetConsultBtn();
            resetAll();
          })
          .catch(function () {
            alert("送信に失敗しました。もう一度お試しください。");
            resetConsultBtn();
          });
      });

      renderStep();
    })();
  </script>
</body>
</html>
